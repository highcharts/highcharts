<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="https://code.highcharts.com/modules/stock.js"></script>
<script src="https://code.highcharts.com/modules/accessibility.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@highcharts/controls@0.8.0" type="module"></script>

<figure class="highcharts-figure">
  <div id="container"></div>
</figure>

<div class="highcharts-controls-wrapper">
  <highcharts-controls>
    <highcharts-group header="Update options">
      <highcharts-control path="tooltip.header.backgroundColor" value="#444444"></highcharts-control>
      <highcharts-control path="tooltip.header.borderColor" value="#141414"></highcharts-control>
      <highcharts-control path="tooltip.header.borderWidth" value="1"></highcharts-control>
      <highcharts-control path="tooltip.header.distance" value="5" min="0" max="20"></highcharts-control>
      <highcharts-control path="tooltip.header.style.color" value="#ffffff"></highcharts-control>
    </highcharts-group>
  </highcharts-controls>
</div>
