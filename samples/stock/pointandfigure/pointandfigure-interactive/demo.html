<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="https://code.highcharts.com/modules/stock.js"></script>
<script src="https://code.highcharts.com/modules/pointandfigure.js"></script>
<script src="https://code.highcharts.com/modules/accessibility.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@highcharts/controls@0.8.0" type="module"></script>

<figure class="highcharts-figure">
  <div id="container"></div>
</figure>

<div class="highcharts-controls-wrapper">
  <highcharts-controls>
    <highcharts-group header="Update options">
      <highcharts-control path="series[0].markerUp.lineColor"></highcharts-control>
      <highcharts-control path="series[0].marker.lineColor"></highcharts-control>
      <highcharts-control path="series[0].boxSize" min="1" max="16"></highcharts-control>
      <highcharts-control path="series[0].reversalAmount" min="1" max="16"></highcharts-control>
    </highcharts-group>
  </highcharts-controls>
</div>
