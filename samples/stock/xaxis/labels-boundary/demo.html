<script src="https://cdn.jsdelivr.net/npm/highcharts@v13.0.0-beta.2/highcharts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highcharts@v13.0.0-beta.2/modules/stock.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highcharts@v13.0.0-beta.2/modules/accessibility.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@highcharts/controls@0.8.0" type="module"></script>

<figure class="highcharts-figure">
  <div id="container"></div>
</figure>

<div class="highcharts-controls-wrapper">
  <highcharts-controls>
    <highcharts-group header="Update options">
      <highcharts-control path="xAxis.dateTimeLabelFormats.year.boundary" value="<b>%Y</b>"></highcharts-control>
      <highcharts-control type="text" path="xAxis.dateTimeLabelFormats.month.main" value="%b"></highcharts-control>
    </highcharts-group>
  </highcharts-controls>
</div>
