    href="https://code.highcharts.com/css/stocktools/gui.css">

    href="https://code.highcharts.com/css/annotations/popup.css">

<script src="https://code.highcharts.com/stock/highstock.js"></script>
<script src="https://code.highcharts.com/stock/indicators/indicators-all.js">
</script>
<script src="https://code.highcharts.com/stock/modules/hollowcandlestick.js">
</script>
<script src="https://code.highcharts.com/stock/modules/heikinashi.js">
</script>
<script src="https://code.highcharts.com/stock/modules/drag-panes.js"></script>
<script src="https://code.highcharts.com/modules/annotations-advanced.js">
</script>
<script src="https://code.highcharts.com/modules/price-indicator.js"></script>
<script src="https://code.highcharts.com/modules/full-screen.js"></script>

<div class="controls">
    <div class="control-section">
        <span class="control-label">Columns</span>
        <div class="seg" id="columns" role="group" aria-label="Columns">
            <button type="button" data-cols="1" class="active">1</button>
            <button type="button" data-cols="2">2</button>
            <button type="button" data-cols="3">3</button>
            <button type="button" data-cols="4">4</button>
        </div>
    </div>
    <div class="control-section">
        <span class="control-label">Securities</span>
        <div class="chips" id="tickers" role="group"
            aria-label="Securities"></div>
    </div>
</div>

<div id="container"></div>
