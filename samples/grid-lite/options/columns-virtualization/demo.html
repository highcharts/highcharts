<script src="https://cdn.jsdelivr.net/npm/@highcharts/grid-lite/grid-lite.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@highcharts/controls@0.7.0" type="module"></script>

<div id="container"></div>

<div class="highcharts-controls-wrapper">
    <highcharts-controls target="#container">
        <highcharts-group header="Column virtualization options">
            <highcharts-control
                type="boolean"
                path="rendering.columns.strictWidths"
                value="true"
            ></highcharts-control>
            <highcharts-control
                type="boolean"
                path="rendering.columns.virtualization"
                value="true"
            ></highcharts-control>
            <highcharts-control
                type="number"
                path="rendering.columns.bufferSize"
                value="2"
                min="0"
                max="10"
            ></highcharts-control>
        </highcharts-group>
    </highcharts-controls>
</div>
