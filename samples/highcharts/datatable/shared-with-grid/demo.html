<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@highcharts/grid-lite/grid-lite.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highcharts/grid-lite/css/grid-lite.css" />

<h1>Chart and Grid with shared DataTable</h1>
<div class="outer-container">
    <div id="chart-container"></div>
    <div id="grid-container"></div>
</div>

<div class="button-row">
    <button id="addrow" class="highcharts-demo-button">Add row</button>
    <button id="updaterow" class="highcharts-demo-button">Update row</button>
    <button id="deleterow" class="highcharts-demo-button">Delete row</button>
    <button id="setcolumn" class="highcharts-demo-button">Set column</button>
</div>
