<figure class="highcharts-figure">

    <p class="highcharts-description">Line chart demonstrating some accessibility features of Highcharts. The chart displays the most commonly used screen readers in surveys taken by WebAIM from December 2010 to January 2024. JAWS was the most used screen reader until 2019, when NVDA took over. VoiceOver is the third most used screen reader, followed by Narrator. ZoomText/Fusion had a surge in 2015, but usage is otherwise low. The overall use of other screen readers has declined in recent years, although the latest survey includes Orca at 8.3%. As Orca is only reported in 2024, it is not shown as a trend line, but together with the “Other” category it suggests a slight increase in less common screen readers.</p>
</figure>
