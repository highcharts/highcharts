<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="https://code.highcharts.com/modules/networkgraph.js"></script>
<script src="https://code.highcharts.com/modules/accessibility.js"></script>

<figure class="highcharts-figure">
    <div id="container"></div>
    <p class="highcharts-description">
        A simple network graph rendered with the networkgraph series type. The
        force-directed layout has gravity turned off
        (<code>gravitationalConstant: 0</code>), so nodes are positioned only by
        the repulsion between them and the attraction along their links, without
        being pulled toward the chart center.
    </p>
</figure>
