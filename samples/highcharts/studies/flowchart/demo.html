<figure class="highcharts-figure">
    <div id="container"></div>
    <p class="highcharts-description">
        A <code>flowchart</code> series type, defined as a custom extension of
        <code>networkgraph</code>, that lays out its nodes and links
        automatically with a Sugiyama-style layered layout instead of a force
        simulation. <strong>Phase 1, cycle removal:</strong> a layered layout
        needs a directed acyclic graph, but flowcharts contain feedback loops,
        so the greedy heuristic of Eades, Lin &amp; Smyth reverses a small set
        of "back" edges to break every cycle. <strong>Phase 2, layer
        assignment:</strong> each node is ranked into a horizontal layer by
        longest-path layering and stacked top-to-bottom by that layer.
        <strong>Phase 3, crossing reduction:</strong> edges spanning several
        layers are routed through internal dummy waypoints, then nodes are
        reordered within each layer by the median heuristic (sweeping down
        and up) to minimise edge crossings. <strong>Phase 4, coordinate
        assignment:</strong> the priority method turns that order into real X
        coordinates, pulling each node toward the median of its neighbours
        while keeping a minimum gap; dummy waypoints get top priority, so
        long edges — including reversed back-edges — straighten into
        vertical runs. The series renders each edge as a bent polyline with
        an arrowhead pointing at its real <code>to</code> node, even when a
        back edge lays out going "up". Open the console to inspect the
        vertex order, reversed edges, each node's layer and the crossing
        count before and after reduction.
    </p>
</figure>
