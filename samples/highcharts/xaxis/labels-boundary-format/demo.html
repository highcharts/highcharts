<script src="https://cdn.jsdelivr.net/npm/highcharts@v13.0.0-beta.1/highcharts.js"></script>
<script src="https://code.highcharts.com/modules/accessibility.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@highcharts/controls@0.8.0" type="module"></script>

<figure class="highcharts-figure">
  <div id="container"></div>
</figure>

<div class="highcharts-controls-wrapper">
  <highcharts-controls>
    <highcharts-group header="Update options">
      <highcharts-control type="text" path="xAxis.labels.format" value="{#if (eq boundary &quot;month&quot;)}{value: %b <b>%Y</b>}
        {else}{value: %e of %b}{/if}"></highcharts-control>
    </highcharts-group>
  </highcharts-controls>
</div>
