<script src="https://code.highcharts.com/highcharts.js"></script>

<div id="container"></div>
<div class="controls">
    <label for="padding-slider">
        pointPadding:
        <span id="padding-value">10</span>px
    </label>
    <input
        id="padding-slider"
        type="range"
        min="0"
        max="30"
        step="0.1"
        value="10"
    >
</div>
<div class="controls">
    <label for="inner-slider">
        innerSize:
        <span id="inner-value">50</span>%
    </label>
    <input
        id="inner-slider"
        type="range"
        min="0"
        max="90"
        step="1"
        value="50"
    >
</div>
