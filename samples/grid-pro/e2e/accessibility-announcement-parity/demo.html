<script src="https://cdn.jsdelivr.net/npm/@highcharts/grid-pro/grid-pro.js"></script>

<div class="comparison">
    <section class="panel">
        <h2>Native Table</h2>
        <p class="description">
            Focus enters through the first column header and arrow keys move
            between cells.
        </p>
        <button id="before-native" class="entry-button">Before native table</button>
        <table id="native-table"></table>
    </section>

    <section class="panel">
        <h2>Grid Table</h2>
        <p class="description">
            Same data rendered through Grid for accessibility parity checks.
        </p>
        <button id="before-grid" class="entry-button">Before grid table</button>
        <div id="grid-container" class="hcg-theme-default"></div>
    </section>
</div>
