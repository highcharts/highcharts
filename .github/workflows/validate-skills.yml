name: Validate agent skills

on:
  pull_request:
    branches: [ 'master', 'dash/**', 'grid/**' ]
    paths:
      - '.agents/skills/**'
      - '.claude/skills/**'
      - 'tools/generate-doc-skills.js'
      - 'tools/skill-configs/**'
      - '.github/workflows/validate-skills.yml'
  workflow_dispatch:

permissions:
   contents: read # to fetch code (actions/checkout)

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate_skills:
    timeout-minutes: 10
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Use Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.13'

      - name: Install skills-ref
        run: python -m pip install skills-ref==0.1.1

      - name: Validate skills
        run: |
          python - <<'PY'
          from pathlib import Path
          from skills_ref import validate

          roots = [Path('.agents/skills'), Path('.claude/skills')]
          skill_dirs = sorted({
              skill_file.parent
              for root in roots
              if root.is_dir()
              for skill_file in root.rglob('SKILL.md')
          })

          if not skill_dirs:
              raise SystemExit('No SKILL.md files found.')

          failed = False
          for skill_dir in skill_dirs:
              print(f'Validating {skill_dir}')
              problems = validate(skill_dir)
              if problems:
                  failed = True
                  print(f'::error title={skill_dir}::Validation failed')
                  for problem in problems:
                      print(f'  - {problem}')

          if failed:
              raise SystemExit(1)

          print(f'Validated {len(skill_dirs)} skills.')
          PY
