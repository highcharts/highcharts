name: Stock benchmark
on:
  pull_request:
    branches:
      - 'master'
    paths:
      - 'ts/Stock/**'
      - 'ts/Core/Axis/OrdinalAxis.ts'
      - 'ts/Extensions/Annotations/**'
      - 'ts/Extensions/DataGrouping/**'
      - 'test/ts-node-unit-tests/benchmark/Stock/'
      - 'ts/Core/Chart/StockChart.ts'
      - 'ts/Core/Axis/BrokenAxis.ts'
      - '.github/workflows/stock-benchmark.yml'
  workflow_dispatch:

permissions:
  contents: read # to fetch code (actions/checkout)

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  stock-benchmark:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        node-version: [lts/*]
    env:
      HIGHCHARTS_VISUAL_TESTS_BUCKET: ${{secrets.VISUAL_TESTS_S3_BUCKET}}
      AWS_ACCESS_KEY_ID: ${{secrets.VISUAL_TESTS_AWS_ACCESS_KEY_ID}}
      AWS_SECRET_ACCESS_KEY: ${{secrets.VISUAL_TESTS_AWS_SECRET_ACCESS_KEY}}
      AWS_REGION: ${{secrets.VISUAL_TESTS_AWS_REGION}}
      BENCHMARK_CATEGORY: Stock
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: Build Highcharts
        run: npx gulp scripts

      - name: Fetch cached base results from S3
        continue-on-error: true
        run: |
          mkdir -p tmp/benchmarks/base
          aws s3 sync \
          "s3://${HIGHCHARTS_VISUAL_TESTS_BUCKET}/benchmarks/reference/latest/" tmp/benchmarks/base/ \
          --exclude "*" --include "${BENCHMARK_CATEGORY}/*.json"

      - name: Check cached base results
        id: check_base
        run: .github/scripts/checkBenchmarkBase.sh "${BENCHMARK_CATEGORY}"

      - name: Benchmark
        run: node --import tsx test/ts-node-unit-tests/bench.ts --context actual --pattern ${BENCHMARK_CATEGORY}/

      # Fallback: cached base is missing or incomplete, so build it from master.
      - name: Checkout master (fallback)
        if: steps.check_base.outputs.need_master == 'true'
        uses: actions/checkout@v6
        with:
          ref: master
          clean: false # keep the PR build and fetched base results
      - name: Install dependencies (fallback)
        if: steps.check_base.outputs.need_master == 'true'
        run: npm ci
      - name: Build Highcharts (fallback)
        if: steps.check_base.outputs.need_master == 'true'
        run: npx gulp scripts
      - name: Benchmark master (fallback)
        if: steps.check_base.outputs.need_master == 'true'
        run: node --import tsx test/ts-node-unit-tests/bench.ts --context base --pattern ${BENCHMARK_CATEGORY}/
      - name: Restore PR branch (fallback)
        if: steps.check_base.outputs.need_master == 'true'
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Benchmark comparison
        run: node --import tsx test/ts-node-unit-tests/benchmark-compare.ts

      - name: Store artifacts
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-files
          path: |
            tmp/benchmarks

      - name: Comment on PR
        uses: actions/github-script@v8
        with:
          github-token: ${{secrets.PR_COMMENT_TOKEN}}
          script: |
            const { createOrUpdateComment } = require('./.github/scripts/commentOnPR');
            const { readFileSync } = require('node:fs')

            const benchmarkMD = readFileSync('./tmp/benchmarks/table.md');

            await createOrUpdateComment(github, context, 'Benchmark report - Stock', benchmarkMD || 'No table to show');


      - name: Add to summary
        if: ${{ always() }}
        run: |
          echo "## Benchmark metrics" >> $GITHUB_STEP_SUMMARY
          cat ./tmp/benchmarks/table.md >> $GITHUB_STEP_SUMMARY
