name: Notify docs changes

on:
  push:
    branches: [ 'master' ]
    paths:
      - 'docs/**/*.md'
  pull_request:
    branches: [ 'master' ]
    paths:
      - 'docs/**/*.md'

permissions:
   contents: read
   pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notify:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest-slim
    steps:
      - name: Trigger Slack workflow
        id: slack
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_DOCS_NOTIFICATION_WEBHOOK }}
          webhook-type: webhook-trigger

      - name: Trigger doc-builder deploy
        continue-on-error: true
        env:
          DISPATCH_TOKEN: ${{ secrets.DEMO_DOCS_WORKFLOW_DISPATCH_TOKEN }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${DISPATCH_TOKEN}" \
            https://api.github.com/repos/highcharts/doc-builder/actions/workflows/build_and_deploy.yml/dispatches \
            -d '{"ref":"main"}'

  docs:
    runs-on: ubuntu-latest-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger doc build for this branch
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        env:
          TOKEN: ${{ secrets.DOC_BUILDER_BUILD_TRIGGER_TOKEN }}
          DOC_BUILDER_URL: ${{ secrets.DOC_BUILDER_URL }}
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            BRANCH="${HEAD_REF}"
          else
            BRANCH="${REF_NAME}"
          fi
          curl --fail --show-error --silent \
            -X POST "${DOC_BUILDER_URL}/build/trigger" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg ref "refs/heads/${BRANCH}" '{"ref": $ref}')"

      - name: Comment on PR with changed docs
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          DOC_BUILDER_URL: ${{ secrets.DOC_BUILDER_URL }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { createOrUpdateComment } = require('./.github/scripts/commentOnPR.js');

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                per_page: 100
              }
            );

            const docsFiles = files
              .filter(f => f.filename.startsWith('docs/') && f.filename.endsWith('.md'))
              .map(f => f.filename);

            if (docsFiles.length === 0) return;

            const branch = context.payload.pull_request.head.ref;
            const baseUrl = (process.env.DOC_BUILDER_URL || '').replace(/\/+$/, '');

            function getDocUrl(file) {
              const defaultPath = file.replace(/^docs\//, '').replace(/\.md$/, '');
              const defaultUrl = `${baseUrl}/docs/${defaultPath}`;

              try {
                const content = fs.readFileSync(path.join(process.cwd(), file), 'utf8');
                const frontmatterMatch = content.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?/);

                if (!frontmatterMatch) {
                  return defaultUrl;
                }

                const slugMatch = frontmatterMatch[1].match(/^\s*slug:\s*(.+)\s*$/m);

                if (!slugMatch) {
                  return defaultUrl;
                }

                const rawSlug = slugMatch[1].trim().replace(/^["']|["']$/g, '');

                if (!/^[a-zA-Z0-9/_\-.]+$/.test(rawSlug)) return defaultUrl;

                if (rawSlug === '/') {
                  return `${baseUrl}/docs/`;
                }

                const normalizedSlug = rawSlug.startsWith('/') ? rawSlug : `/${rawSlug}`;
                return `${baseUrl}/docs${normalizedSlug}`;
              } catch {
                return defaultUrl;
              }
            }

            const links = docsFiles.map(file => `- [${file}](${getDocUrl(file)}?branch=${encodeURIComponent(branch)})`).join('\n');

            const body = `The following documentation files were changed in this PR:\n\n${links}`;

            await createOrUpdateComment(github, context, '📚 Docs Preview', body);
