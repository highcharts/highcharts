name: Notify docs changes

on:
  push:
    branches: [ 'master' ]
    paths:
      - 'docs/**/*.md'
  pull_request:
    branches: [ 'master' ]
    paths:
      - 'docs/**/*.md'

permissions:
   contents: read
   pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Slack workflow
        id: slack
        if: github.event_name == 'push'
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_DOCS_NOTIFICATION_WEBHOOK }}
          webhook-type: webhook-trigger

      - name: Trigger doc build for this branch
        continue-on-error: true
        run: |
          BRANCH="${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}"
          curl --fail --show-error --silent \
            -X POST "${{ secrets.DOC_BUILDER_URL }}/build/trigger" \
            -H "Authorization: Bearer ${{ secrets.DOC_BUILDER_BUILD_TRIGGER_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"ref\":\"refs/heads/${BRANCH}\"}"

      - name: Comment on PR with changed docs
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            const docsFiles = files
              .filter(f => f.filename.startsWith('docs/') && f.filename.endsWith('.md'))
              .map(f => f.filename);
            
            if (docsFiles.length === 0) return;
            
            const branch = context.payload.pull_request.head.ref;
            const baseUrl = 'https://www.highcharts.com/docs';
            
            const links = docsFiles.map(file => {
              // Convert docs/some-folder/file.md to the URL path
              const urlPath = file.replace(/^docs\//, '').replace(/\.md$/, '');
              return `- [${file}](${baseUrl}/${urlPath}?branch=${branch})`;
            }).join('\n');
            
            const body = `## 📚 Docs Preview\n\nThe following documentation files were changed in this PR:\n\n${links}`;
            
            // Find existing comment from this workflow
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('## 📚 Docs Preview')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
