name: Grid DTS Lint

on:
  push:
    branches: ['master', 'grid/**']
    paths:
      - '.github/workflows/grid-dts-lint.yml'
      - 'test/typescript-dts/tsconfig.json'
      - 'test/typescript-dts/grid/**'
      - 'tools/gulptasks/lint-dts.js'
      - 'tools/gulptasks/scripts-ts.js'
      - 'ts/Data/**'
      - 'ts/Grid/**'
      - 'ts/Shared/**'
      - 'ts/Core/Color/**'
      - 'ts/Core/Renderer/**'
      - 'ts/masters-grid/**'
      - 'ts/masters/modules/accessibility.src.ts'
  pull_request:
    branches: ['master', 'grid/**']
    paths:
      - '.github/workflows/grid-dts-lint.yml'
      - 'test/typescript-dts/tsconfig.json'
      - 'test/typescript-dts/grid/**'
      - 'tools/gulptasks/lint-dts.js'
      - 'tools/gulptasks/scripts-ts.js'
      - 'ts/Data/**'
      - 'ts/Grid/**'
      - 'ts/Shared/**'
      - 'ts/Core/Color/**'
      - 'ts/Core/Renderer/**'
      - 'ts/masters-grid/**'
      - 'ts/masters/modules/accessibility.src.ts'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  grid_dts_lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Grid scripts
        run: npx gulp scripts --product Grid

      - name: Lint Grid DTS
        run: npx gulp lint-dts --product Grid
