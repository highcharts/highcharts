name: Grid benchmark
on:
  pull_request:
    branches:
      - 'master'
      - 'grid/**'
    paths:
      - 'ts/Grid/**'
      - 'css/grid/**'
      - 'tests/benchmarks/**'
      - '.github/workflows/grid-benchmark.yml'
  workflow_dispatch:

permissions:
  contents: read # to fetch code (actions/checkout)

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  grid_benchmark:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        node-version: [lts/*]
    steps:
      # --- Base (master) build -------------------------------------------------
      - uses: actions/checkout@v6
        with:
          ref: master

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build Highcharts (base)
        run: npx gulp scripts
      - name: Build Grid (base)
        run: npx gulp scripts --product Grid

      # Keep the master build so the harness can compare against it.
      - name: Stash base build
        run: rm -rf code-base && cp -r code code-base

      # --- PR build ------------------------------------------------------------
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          clean: false # keep code-base and node_modules from the previous step

      - run: npm ci

      - name: Build Highcharts (PR)
        run: npx gulp scripts
      - name: Build Grid (PR)
        run: npx gulp scripts --product Grid

      # --- Measure & compare ---------------------------------------------------
      - name: Benchmark (interleaved base vs PR)
        continue-on-error: true
        run: cd tests/benchmarks && node --import tsx harness/run.ts --base code-base --pr code

      - name: Compare
        if: ${{ always() }}
        run: cd tests/benchmarks && node --import tsx harness/compare.ts

      - name: Store artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: grid-benchmark-files
          path: |
            tmp/benchmarks

      - name: Comment on PR
        if: ${{ always() }}
        uses: actions/github-script@v8
        with:
          github-token: ${{secrets.PR_COMMENT_TOKEN}}
          script: |
            const { createOrUpdateComment } = require('./.github/scripts/commentOnPR');
            const { readFileSync } = require('node:fs');

            let benchmarkMD = 'No table to show';
            try {
              benchmarkMD = readFileSync('./tmp/benchmarks/table.md', 'utf8');
            } catch (e) {
              console.log('No benchmark table found:', e.message);
            }

            await createOrUpdateComment(github, context, 'Benchmark report - Grid', benchmarkMD);

      - name: Add to summary
        if: ${{ always() }}
        run: |
          echo "## Grid Benchmark metrics" >> $GITHUB_STEP_SUMMARY
          cat ./tmp/benchmarks/table.md >> $GITHUB_STEP_SUMMARY || echo "No table produced" >> $GITHUB_STEP_SUMMARY
