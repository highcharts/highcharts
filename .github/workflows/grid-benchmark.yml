name: Grid benchmark
on:
  pull_request:
    branches:
      - 'master'
      - 'grid/**'
    paths:
      - 'ts/Grid/**'
      - 'test/ts-node-unit-tests/benchmarks/Grid/*'
      - '.github/workflows/grid-benchmark.yml'
  workflow_dispatch:

permissions:
  contents: read # to fetch code (actions/checkout)

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  grid_benchmark:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        node-version: [lts/*]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: Build Highcharts
        run: npx gulp scripts
      - name: Build Grid
        run: npx gulp scripts --product Grid

      - name: Benchmark
        continue-on-error: true
        run: cd test/ts-node-unit-tests && node --import tsx bench.ts --context base --pattern Grid/

      - name: Checkout current branch
        uses: actions/checkout@v6
        with:
           clean: false # do not remove files from previous run
      - run: npm ci

      - name: Build Highcharts
        run: npx gulp scripts

      - name: Build Grid
        run: npx gulp scripts --product Grid

      - name: Benchmark
        run: cd test/ts-node-unit-tests && node --import tsx bench.ts --context actual --pattern Grid/

      - name: Benchmark comparison
        run: cd test/ts-node-unit-tests && node --import tsx benchmark-compare.ts

      - name: Store artifacts
        uses: actions/upload-artifact@v6
        with:
          name: grid-benchmark-files
          path: |
            tmp/benchmarks

      - name: Comment on PR
        uses: actions/github-script@v8
        with:
          github-token: ${{secrets.PR_COMMENT_TOKEN}}
          script: |
            const { readFileSync } = require('node:fs')

            async function createOrUpdateComment(github, context, title, body) {
              const { data: comments } = await github.rest.issues.listComments({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo
              });

              const normalizedTitle = title.split('-')[0].trim();
              const commentToUpdate = comments.find(comment =>
                (comment.body || '').startsWith('## ' + normalizedTitle)
              );
              const commentBody = '## ' + title + '\n' + body;

              if (commentToUpdate) {
                await github.rest.issues.updateComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: commentToUpdate.id,
                  body: commentBody
                });
              } else {
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: commentBody
                });
              }
            }

            const benchmarkMD = readFileSync('./tmp/benchmarks/table.md');

            await createOrUpdateComment(github, context, 'Benchmark report - Grid', benchmarkMD || 'No table to show');


      - name: Add to summary
        if: ${{ always() }}
        run: |
          echo "## Grid Benchmark metrics" >> $GITHUB_STEP_SUMMARY
          cat ./tmp/benchmarks/table.md >> $GITHUB_STEP_SUMMARY
