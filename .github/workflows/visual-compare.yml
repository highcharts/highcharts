name: Highcharts Visual Comparison
on:
  workflow_dispatch:
  pull_request:
    branches:
      - 'master'
    paths:
      - 'samples/**'
      - 'ts/**'
      - 'css/**'
      - '.github/workflows/visual-compare.yml'

permissions:
  contents: read # to fetch code (actions/checkout)

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  file_size_comparison:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master

      - name: Use Node.js lts/*
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript version
        run: npx tsc -v

      - name: Build Highcharts
        run: npx gulp scripts

      - name: Build Grid
        run: npx gulp scripts --product Grid

      - name: Build Dashboards
        run: npx gulp scripts --product Dashboards

      - name: Write file sizes at master
        run: npx gulp write-file-sizes --filename master.json

      - name: Checkout current branch
        uses: actions/checkout@v6
        with:
          clean: false
          fetch-depth: 0

      - name: Use Node.js lts/*
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript version
        run: npx tsc -v

      - name: Build Highcharts
        run: npx gulp scripts

      - name: Build Grid
        run: npx gulp scripts --product Grid

      - name: Build Dashboards
        run: npx gulp scripts --product Dashboards

      - name: File size comparison
        run: |
          npx gulp write-file-sizes --filename ${{github.event.pull_request.number}}.json
          npx gulp write-size-table \
          --master ./tmp/filesizes/master.json \
          --proposed ./tmp/filesizes/${{github.event.pull_request.number}}.json

      - name: Checkout trusted comment helper
        if: ${{ github.event.pull_request.number && hashFiles('tmp/filesizes/comparison.md') != '' }}
        uses: actions/checkout@v6
        with:
          ref: master
          path: trusted-highcharts
          sparse-checkout: |
            .github/scripts/commentOnPR.js
          sparse-checkout-cone-mode: false

      - name: Comment PR with file size table
        if: ${{ github.event.pull_request.number && hashFiles('tmp/filesizes/comparison.md') != '' }}
        uses: actions/github-script@v9
        with:
          github-token: ${{secrets.PR_COMMENT_TOKEN}}
          script: |
            const { readFileSync } = require('node:fs');
            const { createOrUpdateComment } = require('./trusted-highcharts/.github/scripts/commentOnPR');

            const comparisonPath = './tmp/filesizes/comparison.md';
            const title = 'File size comparison';

            let body = readFileSync(comparisonPath, 'utf8');
            body = body.replace(/^### File size comparison\s*/i, '').trim();

            if (!body) {
              body = 'No differences found';
            }

            if (!body.startsWith('\n')) {
              body = `\n${body}`;
            }

            await createOrUpdateComment(
              github,
              context,
              title,
              body
            );

      - name: Upload file size comparison artifact
        if: ${{ always() && hashFiles('tmp/filesizes/comparison.md') != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: filesize-comparison-${{ github.event.pull_request.number || github.run_id }}
          path: |
            tmp/filesizes/master.json
            tmp/filesizes/${{ github.event.pull_request.number }}.json
            tmp/filesizes/comparison.md


  visual_compare:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [lts/*]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Highcharts
        run: npx gulp scripts

      - run: npx karma start test/karma-conf.js --tests highcharts/*/* --ts --reference --browsercount 2 --no-fail-on-empty-test-suite
      - run: npx karma start test/karma-conf.js --tests maps/*/* --ts --reference --browsercount 2 --no-fail-on-empty-test-suite
      - run: npx karma start test/karma-conf.js --tests stock/*/* --ts --reference --browsercount 2 --no-fail-on-empty-test-suite
      - run: npx karma start test/karma-conf.js --tests gantt/*/* --ts --reference --browsercount 2 --no-fail-on-empty-test-suite

      - name: Checkout current branch
        uses: actions/checkout@v6
        with:
          clean: false
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Highcharts
        run: npx gulp scripts

      - run: npx karma start test/karma-conf.js --tests highcharts/*/* --ts --single-run --browsercount 2 --visualcompare || true
      - run: npx karma start test/karma-conf.js --tests stock/*/* --ts --single-run --browsercount 2 --visualcompare || true
      - run: npx karma start test/karma-conf.js --tests maps/*/* --ts --single-run --browsercount 2 --visualcompare || true
      - run: npx karma start test/karma-conf.js --tests gantt/*/* --ts --single-run --browsercount 2 --visualcompare || true

      - name: Generate visual test report
        run: |
          npx gulp update-pr-testresults \
          --fail-silently \
          --pr ${{github.event.pull_request.number}}
        if: ${{ always() }}
        env:
          HIGHCHARTS_VISUAL_TESTS_BUCKET: ${{secrets.VISUAL_TESTS_S3_BUCKET}}
          AWS_ACCESS_KEY_ID: ${{secrets.VISUAL_TESTS_AWS_ACCESS_KEY_ID}}
          AWS_SECRET_ACCESS_KEY: ${{secrets.VISUAL_TESTS_AWS_SECRET_ACCESS_KEY}}
          AWS_REGION: ${{secrets.VISUAL_TESTS_AWS_REGION}}

      - name: Purge references with no candidate
        if: ${{ always() }}
        run: |
          find ./samples -type f -name "reference.svg" \
            -exec sh -c '
              for f do
                dir="$(dirname "$f")"
                candidate_path="$dir/candidate.svg"
                if [ ! -f "$candidate_path" ]; then
                  echo "Deleting unpaired reference: $f"
                  rm "$f"
                fi
              done
            ' sh {} +

      - name: Upload visual test images
        if: ${{ always() }}
        run: |
          aws s3 sync ./samples \
          "s3://$HIGHCHARTS_VISUAL_TESTS_BUCKET/visualtests/diffs/pullrequests/$PR_NUMBER/" \
          --exclude "*" \
          --include "*/reference.svg" \
          --include "*/candidate.svg" \
          --include "*/diff.gif"
        env:
          HIGHCHARTS_VISUAL_TESTS_BUCKET: ${{secrets.VISUAL_TESTS_S3_BUCKET}}
          AWS_ACCESS_KEY_ID: ${{secrets.VISUAL_TESTS_AWS_ACCESS_KEY_ID}}
          AWS_SECRET_ACCESS_KEY: ${{secrets.VISUAL_TESTS_AWS_SECRET_ACCESS_KEY}}
          AWS_REGION: ${{secrets.VISUAL_TESTS_AWS_REGION}}
          PR_NUMBER: ${{github.event.pull_request.number}}

      - name: Resolve visual status metadata
        id: visual_status
        if: ${{ always() && hashFiles('test/visual-test-results.json') != '' }}
        run: |
          node <<'NODE'
          const { readFileSync, existsSync, appendFileSync } = require('node:fs');

          const prNumber = process.env.PR_NUMBER;
          const outputFile = process.env.GITHUB_OUTPUT;
          const reviewPath = `./test/review-pr-${prNumber}.json`;

          let state = 'failure';
          let description = 'Review of changed samples needed. Click on details.';

          if (existsSync(reviewPath)) {
            const review = JSON.parse(readFileSync(reviewPath, 'utf8'));
            const samples = Array.isArray(review?.samples) ? review.samples : [];

            if (samples.length === 0) {
              state = 'success';
              description = 'No diffing samples found.';
            } else if (samples.every(sample => sample && sample.approved)) {
              state = 'success';
              description = 'Diffing samples are approved';
            }
          } else {
            const results = JSON.parse(readFileSync('./test/visual-test-results.json', 'utf8'));
            const hasDiffs = Object.entries(results).some(([key, value]) =>
              key !== 'meta' && typeof value === 'number' && value > 0
            );
            if (!hasDiffs) {
              state = 'success';
              description = 'No diffing samples found.';
            }
          }

          appendFileSync(outputFile, `state=${state}\n`);
          appendFileSync(outputFile, `description=${description}\n`);
          NODE
        env:
          PR_NUMBER: ${{github.event.pull_request.number}}

      - name: Checkout trusted comment helper
        if: ${{ always() && (hashFiles('tmp/pr-visual-test-comment.json') != '' || hashFiles('test/visual-test-results.json') != '') }}
        uses: actions/checkout@v6
        with:
          ref: master
          path: trusted-highcharts
          sparse-checkout: |
            .github/scripts/commentOnPR.js
            .github/scripts/setCommitStatus.js
          sparse-checkout-cone-mode: false

      - name: Update commit status (trusted)
        uses: actions/github-script@v9
        if: ${{ always() && steps.visual_status.outputs.state != '' }}
        with:
          github-token: ${{secrets.PR_COMMENT_TOKEN}}
          script: |
            const { setCommitStatus } = require('./trusted-highcharts/.github/scripts/setCommitStatus');

            const prNumber = context.issue.number;
            const sha = context.payload.pull_request?.head?.sha;

            if (!sha) {
              core.warning('Skipping commit status update because PR head SHA is missing.');
              return;
            }

            try {
              await setCommitStatus({
                github: github.rest,
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                state: '${{ steps.visual_status.outputs.state }}',
                targetUrl: `https://vrevs.highsoft.com/pr/${prNumber}/review`,
                description: '${{ steps.visual_status.outputs.description }}',
                context: 'Highcharts review tool'
              });
            } catch (error) {
              core.warning(`Failed to create commit status for ${sha}: ${error.message}`);
            }

      - name: Comment on PR
        uses: actions/github-script@v9
        if: ${{ always() && hashFiles('tmp/pr-visual-test-comment.json') != '' }}
        with:
          github-token: ${{secrets.PR_COMMENT_TOKEN}}
          script: |
            const { createOrUpdateComment } = require('./trusted-highcharts/.github/scripts/commentOnPR');
            const { existsSync, readFileSync } = require('node:fs');

            const commentPath = './tmp/pr-visual-test-comment.json';

            if (!existsSync(commentPath)) {
              core.warning(`Skipping PR comment because ${commentPath} is missing.`);
              return;
            }

            let parsed;
            try {
              parsed = JSON.parse(readFileSync(commentPath, 'utf8'));
            } catch (error) {
              core.warning(`Skipping PR comment because ${commentPath} could not be parsed: ${error.message}`);
              return;
            }

            const { title = 'Visual test results', body = '' } = parsed;

            const normalizedBody = body.startsWith('\n') ? body : `\n${body}`;

            await createOrUpdateComment(
              github,
              context,
              title,
              normalizedBody
            );


      - name: Store artifacts
        uses: actions/upload-artifact@v6
        if: ${{ always() }}
        with:
          name: visual-test-results
          path: |
            test/visual-test-results.json
            test/review-pr-*.json
            tmp/pr-visual-test-comment.json
